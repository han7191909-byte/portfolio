              alt: "砂糖の結晶写真 " + (index + 1),
              temperature: temperature,
            };
          });

          return (
            nav(work.id, work.title) +
            '<main class="satou-detail">' +
            '<section class="satou-hero" aria-label="砂糖に宿る光のかたち">' +
            '<div class="satou-title-block"><h1>砂糖に宿る光のかたち</h1><p>Light Residing in Sugar</p></div>' +
            '<div class="satou-floating-grid">' +
            floatingImages
              .map(function (image, index) {
                return (
                  '<button class="satou-float-card satou-float-' +
                  (index + 1) +
                  '" type="button" data-src="' +
                  image.src +
                  '" data-alt="' +
                  image.alt +
                  '" data-cursor="work" style="--float-index:' +
                  index +
                  '">' +
                  '<img src="' +
                  image.src +
                  '" alt="' +
                  image.alt +
                  '" loading="lazy" decoding="async"><span>' +
                  image.temperature +
                  "</span></button>"
                );
              })
              .join("") +
            "</div></section>" +
            '<section class="satou-intro"><figure class="satou-book-image"><img src="./satou-intro-display.png" alt="砂糖作品の冊子を開いた展示写真" loading="lazy" decoding="async"></figure>' +
            '<div class="satou-text">' +
            "<p>砂糖は加熱によって少しずつ姿を変え、やがて琥珀のように透き通った結晶になり、さらに光にかざすと、ふだんは見えない細かな美しい模様がうかび上がります。</p>" +
            "<p>温度や固まり方のちがいによって、影の色や形は毎回少しずつ変わり、同じものは二度と生まれません。そこから私は、無限に広がる美しさを感じ取りました。その一瞬ごとの影を一冊の本に集めて、展示にまとめました。</p>" +
            "<p>私たちが最初に目にする姿は、物の全体像ではないかもしれません。光や水などの媒介を通して、多くのものが想像できない現象として立ち現れるのです。身の回りにある最も日常的なものの中にも、美の可能性がたくさん潜んでいます。</p>" +
            "</div></section>" +
            '<div class="satou-image-stack"><figure><img src="./satou-layout.png" alt="砂糖作品の紙面展開" loading="lazy" decoding="async"></figure><figure><img src="./satou-display.png" alt="砂糖作品の展示写真" loading="lazy" decoding="async"></figure></div>' +
            "</main>" +
            '<div class="satou-lightbox" aria-hidden="true"><button class="satou-lightbox-backdrop" type="button" aria-label="画像を閉じる"></button><img src="" alt=""></div>' +
            '<footer class="thanks-section satou-footer"><p>OIY.</p><p>Department of Visual Communication Design</p><p>han7191909@gmail.com</p></footer>'
          );
        }

        function typographyDetailPage(work) {
          return (
            nav(work.id, work.title) +
            '<main class="typography-detail">' +
            '<section class="typography-head"><h1>Typography</h1><div class="typography-meta">' +
            '<p><span>制作時間</span><span>2024.4-9</span></p>' +
            '<p><span>課題制作</span><span>授業名：タイポグラフィ</span></p>' +
            '<div class="typography-pills"><span>typography</span><span>type design</span></div>' +
            "</div></section>" +
            '<figure class="typography-main-image"><img src="' +
            work.cover +
            '" alt="' +
            work.alt +
            '" loading="eager" decoding="async"></figure>' +
            '<section class="typography-copy-block"><p class="typography-caption">ゆく川の流れは 絶えずして しかも元の水にあらず　淀みに浮かぶうたかたは かつ消え　かつ結びて</p>' +
            '<div class="typography-concept"><h2>コンセプト</h2>' +
            '<p>『方丈記』冒頭部分を題材に制作した、開ひらがなの書体。</p>' +
            '<p>水の流れを通して無常を描く『方丈記』の世界観から着想し、素早く流れるような筆運びと、軽やかな線の動きを意識した。一部の線を細く長く伸ばすことで、流れ続ける水の感覚と、形をとどめず移ろっていく無常感を表現している。全体としては重さを抑え、軽やかでありながらも、文字としての静かな存在感が残る書体を目指した。</p>' +
            '<p>背景には、中国の青城山で撮影した写真を使用した。</p></div></section>' +
            '<div class="typography-image-stack">' +
            work.images
              .map(function (image) {
                return '<figure><img src="' + image.src + '" alt="' + image.alt + '" loading="lazy" decoding="async"></figure>';
              })
              .join("") +
            "</div></main>" +
            '<footer class="thanks-section typography-footer"><p>OIY.</p><p>Department of Visual Communication Design</p><p>han7191909@gmail.com</p></footer>'
          );
        }

        function aboutPage() {
          return (
            nav("about") +
            '<main class="about-page"><figure class="about-image-block about-image-profile about-reveal" style="--about-delay: 80ms"><img src="./about-profile.png" alt="WANG RUIYAO profile information" loading="eager" decoding="async"></figure><figure class="about-image-block about-image-statement about-reveal" style="--about-delay: 280ms"><img src="./about-statement.png" alt="新しい体験と技術への興味を原動力に、デザインを通して人の心が動く瞬間を届けたい。" loading="eager" decoding="async"></figure><footer class="thanks-section about-footer about-reveal" style="--about-delay: 520ms"><p>OIY.</p><p>Department of Visual Communication Design</p><p>han7191909@gmail.com</p></footer></main>'
          );
        }

        function render() {
          if (autoScrollFrame) {
            cancelAnimationFrame(autoScrollFrame);
            autoScrollFrame = 0;
          }
          teardown();
          var route = window.location.hash.replace(/^#\/?/, "");
          var parts = route.split("/");
          var page = parts[0];
          var id = parts[1];

          if (page === "about") {
            app.innerHTML = aboutPage();
            teardown = setupCursor();
            return;
          }

          if (page === "work") {
            var work = works.filter(function (item) {
              return item.id === id;
            })[0] || works[0];
            app.innerHTML = detailPage(work);
            setupTenSecondVideoLoop(document.querySelector(".detail-video"));
            var destroyCursor = setupCursor();
            var destroySatou = work.id === "satou-ni-yadoru-katachi" ? setupSatouLightbox() : function () {};
            var destroyTenohira = work.id === "tenohira-seiza-kobo" ? setupTenohiraDetail() : function () {};
            var destroyAi = work.id === "ai-niwa-dekinai-koto" ? setupAiDetail() : function () {};
            teardown = function () {
              destroyCursor();
              destroySatou();
              destroyTenohira();
              destroyAi();
            };
            window.scrollTo(0, 0);
            return;
          }

          app.innerHTML = homePage();
          setupTenSecondVideoLoop(document.querySelector(".hero-video"));
          var destroyStack = setupWorkStack();
          var destroyCursor = setupCursor();
          teardown = function () {
            destroyStack();
            destroyCursor();
          };

          if (restoreHomeScrollAfterRender) {
            restoreHomeScrollAfterRender = false;
            requestAnimationFrame(restoreHomeScrollPosition);
            return;
          }

          if (scrollToTopAfterRender) {
            scrollToTopAfterRender = false;
            requestAnimationFrame(function () {
              slowScrollTo(0, 900);
            });
            return;
          }

          if (scrollToWorksAfterRender) {
            scrollToWorksAfterRender = false;
            requestAnimationFrame(scrollToWorks);
          }
        }

        function handleNavClick(event) {
          var workLink = event.target.closest('a[href^="#/work/"]');
          if (workLink) {
            var currentRoute = window.location.hash.replace(/^#\/?/, "");
            if (currentRoute === "" || currentRoute === "works") {
              saveHomeScrollPosition();
            }
            return;
          }

          var worksLink = event.target.closest(".nav-work-main");
          if (worksLink) {
            event.preventDefault();
            scrollToWorksAfterRender = true;
            scrollToTopAfterRender = false;
            restoreHomeScrollAfterRender = false;
            var worksRoute = window.location.hash.replace(/^#\/?/, "");
            if (worksRoute === "" || worksRoute === "works") {
              if (window.location.hash === "#/works") {
                scrollToWorksAfterRender = false;
                requestAnimationFrame(scrollToWorks);
              } else {
                window.location.hash = "#/works";
              }
            } else {
              window.location.hash = "#/works";
            }
            return;
          }

          var homeLink = event.target.closest(".nav-home");
          if (!homeLink) return;

          event.preventDefault();
          scrollToWorksAfterRender = false;
          scrollToTopAfterRender = true;
          restoreHomeScrollAfterRender = false;
          var homeRoute = window.location.hash.replace(/^#\/?/, "");
          if (homeRoute.indexOf("work") === 0) {
            scrollToTopAfterRender = false;
            restoreHomeScrollAfterRender = true;
            window.location.hash = "#/";
            return;
          }

          if (homeRoute === "" || homeRoute === "works") {
            if (window.location.hash === "#/" || window.location.hash === "") {
              scrollToTopAfterRender = false;
              slowScrollTo(0, 900);
            } else {
              window.location.hash = "#/";
            }
          } else {
            window.location.hash = "#/";
          }
        }

        function saveHomeScrollPosition() {
          try {
            sessionStorage.setItem("portfolioHomeScrollY", String(window.scrollY));
          } catch (_) {}
        }

        function restoreHomeScrollPosition() {
          var targetTop = 0;
          try {
            targetTop = Number(sessionStorage.getItem("portfolioHomeScrollY")) || 0;
          } catch (_) {}
          window.scrollTo(0, targetTop);
        }

        function scrollToWorks() {
          var section = document.querySelector(".stack-scroll");
          if (!section) return;
          var targetTop = section.getBoundingClientRect().top + window.scrollY + window.innerHeight * 0.18;
          slowScrollTo(targetTop, 1600);
        }

        function slowScrollTo(targetTop, duration) {
          var reduceMotion = window.matchMedia("(prefers-reduced-motion: reduce)").matches;
          if (reduceMotion) {
            window.scrollTo(0, targetTop);
            return;
          }

          var startTop = window.scrollY;
          var distance = targetTop - startTop;
          var startTime = performance.now();
          var scrollDuration = duration || 1600;

          function ease(progress) {
            return 1 - Math.pow(1 - progress, 3);
          }

          function step(now) {
            var progress = Math.min((now - startTime) / scrollDuration, 1);
            window.scrollTo(0, startTop + distance * ease(progress));
            if (progress < 1) {
              autoScrollFrame = requestAnimationFrame(step);
            } else {
              autoScrollFrame = 0;
            }
          }

          autoScrollFrame = requestAnimationFrame(step);
        }

        function setupTenSecondVideoLoop(video) {
          if (!video) return;
          video.addEventListener("timeupdate", function () {
            if (video.currentTime >= 10) {
              video.currentTime = 0;
              video.play().catch(function () {});
            }
          });
          if (video.play) video.play().catch(function () {});
        }

        function setupWorkStack() {
          var section = document.querySelector(".stack-scroll");
          var panels = Array.prototype.slice.call(document.querySelectorAll(".work-panel"));
          if (!section || !panels.length) return function () {};
          var ticking = false;

          function clamp(value, min, max) {
            return Math.max(min, Math.min(max, value));
          }

          function update() {
            ticking = false;
            var rect = section.getBoundingClientRect();
            var viewport = window.innerHeight;
            var rootStyle = getComputedStyle(document.documentElement);
            var navHeight = parseFloat(rootStyle.getPropertyValue("--nav-h")) || 58;
            var collapsedRow = parseFloat(rootStyle.getPropertyValue("--work-row-h")) || 64;
            var scrollStep = 1.75;
            var raw = clamp(-rect.top / (viewport * scrollStep), 0, panels.length - 1);
            var stageHeight = Math.max(1, viewport - navHeight);
            var expandedInfo = Math.max(360, stageHeight - 8);
            document.documentElement.classList.toggle("is-work-mode", raw > 0.08);

            panels.forEach(function (panel, index) {
              var local = raw - index;
              var incoming = clamp(local + 1, 0, 1);
              var covered = clamp(raw - index, 0, 1);
              var visualCovered = index === 0 ? clamp((covered - 0.18) / 0.82, 0, 1) : covered;
              var stackedOffset = index * collapsedRow;
              var y = index === 0 ? 0 : stackedOffset + (1 - incoming) * (stageHeight - stackedOffset);
              var infoSize = expandedInfo - covered * (expandedInfo - collapsedRow);
              var titleScale = 1 - covered * 0.5;
              var titleCol = 64 - covered * 32;
              var titleGap = 18 - covered * 9;
              var padY = 20 - covered * 14;
              var padX = 48 - covered * 24;
              var padBottom = 22 - covered * 16;
              var workBlur = visualCovered * 22;
              var bodyVisibility = Math.max(0.12, 1 - visualCovered * 0.88);

              panel.style.setProperty("--panel-y", y + "px");
              panel.style.setProperty("--info-size", infoSize + "px");
              panel.style.setProperty("--title-scale", titleScale.toFixed(3));
              panel.style.setProperty("--title-col", titleCol + "px");
              panel.style.setProperty("--title-gap", titleGap + "px");
              panel.style.setProperty("--info-pad-y", padY + "px");
              panel.style.setProperty("--info-pad-x", padX + "px");
              panel.style.setProperty("--info-pad-bottom", padBottom + "px");
              panel.style.setProperty("--work-blur", workBlur.toFixed(2) + "px");
              panel.style.setProperty("--body-visibility", bodyVisibility);
              panel.classList.toggle("is-covered", covered > 0.04);
              panel.classList.toggle("is-current", local >= -0.02 && local < 0.98);
            });
          }

          function requestUpdate() {
            if (ticking) return;
            ticking = true;
            requestAnimationFrame(update);
          }

          update();
          window.addEventListener("scroll", requestUpdate, { passive: true });
          window.addEventListener("resize", requestUpdate);
          return function () {
            window.removeEventListener("scroll", requestUpdate);
            window.removeEventListener("resize", requestUpdate);
            document.documentElement.classList.remove("is-work-mode");
          };
        }

        function setupAiDetail() {
          return setupScrollProgressReveal(".ai-reveal");
        }

        function setupScrollProgressReveal(selector) {
          var revealItems = Array.prototype.slice.call(document.querySelectorAll(selector));
          if (!revealItems.length) return function () {};
          var raf = 0;

          function clamp(value, min, max) {
            return Math.max(min, Math.min(max, value));
          }

          function update() {
            var viewport = window.innerHeight || 1;
            var reduceMotion = window.matchMedia("(prefers-reduced-motion: reduce)").matches;
            revealItems.forEach(function (item, index) {
              if (reduceMotion) {
                item.style.setProperty("--reveal-progress", "1");
                return;
              }
              var rect = item.getBoundingClientRect();
              var stagger = (Number.parseFloat(item.style.getPropertyValue("--reveal-index")) || index) * 0.025;
              var raw = (viewport * 0.92 - rect.top) / (viewport * 0.52);
              var progress = clamp(raw - stagger, 0, 1);
              item.style.setProperty("--reveal-progress", progress.toFixed(3));
            });
            raf = requestAnimationFrame(update);
          }

          update();
          return function () {
            cancelAnimationFrame(raf);
          };
        }

        function setupTenohiraDetail() {
          var revealItems = Array.prototype.slice.call(document.querySelectorAll(".tenohira-reveal"));
          var video = document.querySelector(".tenohira-video-frame video");
          var playButton = document.querySelector(".tenohira-video-play");
          var carousel = document.querySelector(".tenohira-carousel");
          var track = carousel && carousel.querySelector(".tenohira-carousel-track");
          var slides = carousel ? Array.prototype.slice.call(carousel.querySelectorAll(".tenohira-slide")) : [];
          var prev = carousel && carousel.querySelector(".tenohira-arrow-prev");
          var next = carousel && carousel.querySelector(".tenohira-arrow-next");
          var dots = carousel ? Array.prototype.slice.call(carousel.querySelectorAll(".tenohira-dots span")) : [];
          var active = 0;
          var revealRaf = 0;

          if (video && playButton) {
            playButton.addEventListener("click", function () {
              video.controls = true;
              video.play().catch(function () {});
              playButton.classList.add("is-hidden");
              var overlay = playButton.closest(".tenohira-video-overlay");
              if (overlay) overlay.classList.add("is-hidden");
            });
          }

          function clamp(value, min, max) {
            return Math.max(min, Math.min(max, value));
          }

          function updateRevealProgress() {
            var viewport = window.innerHeight || 1;
            var reduceMotion = window.matchMedia("(prefers-reduced-motion: reduce)").matches;
            revealItems.forEach(function (item, index) {
              if (reduceMotion) {
                item.style.setProperty("--reveal-progress", "1");
                return;
              }
              var rect = item.getBoundingClientRect();
              var stagger = (Number.parseFloat(item.style.getPropertyValue("--reveal-index")) || index) * 0.045;
              var raw = (viewport * 0.96 - rect.top) / (viewport * 0.48);
              var progress = clamp(raw - stagger, 0, 1);
              item.style.setProperty("--reveal-progress", progress.toFixed(3));
            });
            revealRaf = requestAnimationFrame(updateRevealProgress);
          }

          revealItems.forEach(function (item) {
            if (!item.style.getPropertyValue("--reveal-progress")) {
              item.style.setProperty("--reveal-progress", "0");
            }
          });
          updateRevealProgress();

          function updateCarousel() {
            if (!track || !slides.length) return;
            track.style.transform = "translate3d(" + -active * 100 + "%, 0, 0)";
            dots.forEach(function (dot, index) {
              dot.classList.toggle("is-active", index === active);
            });
          }

          function go(direction) {
            if (!slides.length) return;
            active = (active + direction + slides.length) % slides.length;
            updateCarousel();
          }

          if (prev && next) {
            prev.addEventListener("click", function () {
              go(-1);
            });
            next.addEventListener("click", function () {
              go(1);
            });
          }
          updateCarousel();

          return function () {
            cancelAnimationFrame(revealRaf);
          };
        }

        function setupSatouLightbox() {
          var lightbox = document.querySelector(".satou-lightbox");
          var lightboxImage = lightbox && lightbox.querySelector("img");
          var backdrop = lightbox && lightbox.querySelector(".satou-lightbox-backdrop");
          var cards = Array.prototype.slice.call(document.querySelectorAll(".satou-float-card"));
          if (!lightbox || !lightboxImage || !backdrop || !cards.length) return function () {};

          function open(card) {
            lightboxImage.src = card.dataset.src || "";
            lightboxImage.alt = card.dataset.alt || "";
            lightbox.classList.add("is-open");
            lightbox.setAttribute("aria-hidden", "false");
            document.documentElement.classList.add("has-satou-lightbox");
            document.documentElement.dataset.cursor = "";
          }

          function close() {
            lightbox.classList.remove("is-open");
            lightbox.setAttribute("aria-hidden", "true");
            document.documentElement.classList.remove("has-satou-lightbox");
            document.documentElement.dataset.cursor = "";
          }

          function handleKeydown(event) {
            if (event.key === "Escape") close();
          }

          cards.forEach(function (card) {
            card.addEventListener("click", function () {
              open(card);
            });
          });
          backdrop.addEventListener("click", close);
          lightboxImage.addEventListener("click", close);
          window.addEventListener("keydown", handleKeydown);

          return function () {
            close();
            window.removeEventListener("keydown", handleKeydown);
          };
        }

        function setupCursor() {
          var canHover = window.matchMedia("(hover: hover) and (pointer: fine)").matches;
          var reduceMotion = window.matchMedia("(prefers-reduced-motion: reduce)").matches;
          var dot = document.querySelector(".cursor-dot");
          var ring = document.querySelector(".cursor-ring");
          if (!canHover || reduceMotion || !dot || !ring) {
            document.documentElement.classList.remove("has-custom-cursor");
            return function () {};
          }

          document.documentElement.classList.add("has-custom-cursor");
          var pointerX = window.innerWidth / 2;
          var pointerY = window.innerHeight / 2;
          var ringX = pointerX;
          var ringY = pointerY;
          var raf = 0;

          function move(event) {
            pointerX = event.clientX;
            pointerY = event.clientY;
            dot.style.transform = "translate3d(" + pointerX + "px," + pointerY + "px,0) translate(-50%, -50%)";
            var target = event.target;
            var modeTarget = target && target.closest ? target.closest("[data-cursor], a, button") : null;
            document.documentElement.dataset.cursor = (modeTarget && modeTarget.dataset.cursor) || (modeTarget ? "link" : "");
          }

          function leaveTarget(event) {
            if (
              !event.relatedTarget ||
              !event.relatedTarget.closest ||
              !event.relatedTarget.closest("[data-cursor], a, button")
            ) {
              document.documentElement.dataset.cursor = "";
            }
          }

          function animate() {
            ringX += (pointerX - ringX) * 0.16;
            ringY += (pointerY - ringY) * 0.16;
            ring.style.transform = "translate3d(" + ringX + "px," + ringY + "px,0) translate(-50%, -50%)";
            raf = requestAnimationFrame(animate);
          }

          document.addEventListener("pointermove", move);
          document.addEventListener("pointerout", leaveTarget);
          document.addEventListener("pointerleave", function () {
            document.documentElement.dataset.cursor = "";
          });
          raf = requestAnimationFrame(animate);

          return function () {
            document.removeEventListener("pointermove", move);
            document.removeEventListener("pointerout", leaveTarget);
            cancelAnimationFrame(raf);
            document.documentElement.dataset.cursor = "";
          };
        }

        window.addEventListener("hashchange", render);
        render();
      })();
    </script>
